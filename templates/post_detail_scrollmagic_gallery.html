<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{{POST_TITLE}}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0f0f0f;
            color: #ddd;
            overflow-x: hidden;
            overflow-anchor: none;
        }

        /* ── TOPBAR ── */
        .topbar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: rgba(15, 15, 15, 0.92);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            position: sticky;
            top: 0;
            z-index: 200;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            min-width: 38px;
            border-radius: 8px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.08);
            color: #e6eef8;
            text-decoration: none;
            flex-shrink: 0;
            transition: background .15s ease, transform .12s ease;
        }
        .back-link:hover {
            background: rgba(255,255,255,0.06);
            transform: translateY(-1px);
        }
        .back-icon {
            width: 18px;
            height: 18px;
            display: block;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.5;
        }

        .topbar-title {
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            min-width: 0;
        }

        .status-label {
            font-size: 12px;
            color: #666;
            font-family: monospace;
            flex-shrink: 0;
            white-space: nowrap;
        }

        /* ── MAIN COLUMN ── */
        .frames-column {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px 12px 120px;
        }

        /* ── FRAME CARD ── */
        .frame {
            display: block;
            position: relative;
            background: #111;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.45);
            margin-bottom: 28px;
            min-height: 220px;
            overflow: hidden;
            will-change: transform, opacity;
        }

        .frame .placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #161616 0%, #1a1a1a 100%);
            z-index: 1;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 2.5px solid rgba(255,255,255,0.08);
            border-top-color: #666;
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
            margin-bottom: 8px;
        }

        .frame-info {
            color: #444;
            font-size: 11px;
            font-family: monospace;
        }

        .frame img {
            width: 100%;
            height: auto;
            display: block;
            opacity: 0;
            transition: opacity 0.35s ease;
            position: relative;
            z-index: 2;
            border-radius: 10px;
        }

        .frame.loaded img { opacity: 1; }
        .frame.loaded .placeholder { display: none; }

        /* ── CAPTION BELOW IMAGE ── */
        .frame-caption {
            padding: 10px 14px 12px;
            font-size: 13px;
            color: #888;
            font-family: monospace;
            line-height: 1.4;
            position: relative;
            z-index: 2;
            display: none;
        }
        .frame-caption.has-caption { display: block; }

        /* ── POST CONTENT ── */
        .post-content {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 12px 40px;
            font-size: 14px;
            color: #aaa;
            line-height: 1.7;
            white-space: pre-line;
        }

        /* ── ScrollMagic REVEAL STATE ── */
        .frame.sm-before {
            opacity: 0;
            transform: translateY(36px) scale(0.985);
        }
        .frame.sm-visible {
            opacity: 1;
            transform: translateY(0) scale(1);
            transition: opacity 0.55s cubic-bezier(0.22, 1, 0.36, 1),
                        transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* ── LIGHTBOX OVERLAY ── */
        .lbox-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.94);
            z-index: 9000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .lbox-overlay.active { display: flex; }

        .lbox-img {
            max-width: 95vw;
            max-height: 88vh;
            object-fit: contain;
            border-radius: 6px;
            display: block;
            user-select: none;
        }

        .lbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 9010;
            transition: background 0.15s;
        }
        .lbox-nav:hover { background: rgba(255,255,255,0.18); }
        .lbox-nav svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; }
        .lbox-prev { left: 12px; }
        .lbox-next { right: 12px; }

        .lbox-close {
            position: absolute;
            top: 14px;
            right: 14px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 9010;
            transition: background 0.15s;
        }
        .lbox-close:hover { background: rgba(255,255,255,0.18); }
        .lbox-close svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }

        .lbox-counter {
            position: absolute;
            bottom: 14px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            font-family: monospace;
            color: #666;
            background: rgba(0,0,0,0.5);
            padding: 3px 10px;
            border-radius: 20px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            .frames-column { padding: 12px 8px 80px; }
            .frame { border-radius: 6px; margin-bottom: 18px; }
        }
    </style>
</head>
<body>

<!-- ── TOPBAR ── -->
<div class="topbar">
    <a class="back-link" href="{{BACK_TO_GRID_URL}}" title="Back to gallery" aria-label="Back to gallery">
        <svg class="back-icon" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="3" y="3" width="7" height="7" rx="1.2"/>
            <rect x="14" y="3" width="7" height="7" rx="1.2"/>
            <rect x="3" y="14" width="7" height="7" rx="1.2"/>
            <rect x="14" y="14" width="7" height="7" rx="1.2"/>
        </svg>
    </a>
    <div class="topbar-title">{{POST_TITLE}}</div>
    <div class="status-label" id="status">—</div>
</div>

<!-- ── FRAMES ── -->
<div class="frames-column" id="frames"></div>

<!-- ── POST CONTENT ── -->
<div class="post-content" id="post-content">{{POST_CONTENT}}</div>

<!-- ── LIGHTBOX ── -->
<div class="lbox-overlay" id="lbox" role="dialog" aria-modal="true" aria-label="Image lightbox">
    <button class="lbox-close" id="lboxClose" aria-label="Close">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <button class="lbox-nav lbox-prev" id="lboxPrev" aria-label="Previous image">
        <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <img class="lbox-img" id="lboxImg" src="" alt="">
    <button class="lbox-nav lbox-next" id="lboxNext" aria-label="Next image">
        <svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>
    </button>
    <div class="lbox-counter" id="lboxCounter"></div>
</div>

<script>
(function () {
    // ── DATA injected by ContentHubManager ──────────────────────────────
    const IMAGES = {{MEDIA_ITEMS_JSON}};

    // ── CONFIG ─────────────────────────────────────────────────────────
    const BATCH   = 30;   // frames rendered per batch
    const PRELOAD = 5;    // radius around current viewport to keep loaded

    // ── STATE ──────────────────────────────────────────────────────────
    const state = {
        loadedCount: 0,
        isRendering: false,
        observer: null,    // IntersectionObserver for lazy-load + memory
        smObserver: null,  // IntersectionObserver for ScrollMagic reveal
        lboxIndex: 0
    };

    // ── DOM REFS ───────────────────────────────────────────────────────
    const elFrames  = document.getElementById('frames');
    const elStatus  = document.getElementById('status');
    const elLbox    = document.getElementById('lbox');
    const elLboxImg = document.getElementById('lboxImg');
    const elCounter = document.getElementById('lboxCounter');

    // ── HEIGHT-LOCK (jump-free scroll) ─────────────────────────────────
    function lockHeight(div, img) {
        if (!div.style.minHeight || div.style.minHeight === '220px') {
            const h = img.getBoundingClientRect().height;
            if (h > 40) {
                div.style.minHeight = h + 'px';
            }
        }
    }

    // ── IMAGE LOAD / UNLOAD ─────────────────────────────────────────────
    function loadImage(div) {
        const img = div.querySelector('img');
        if (!img || div.classList.contains('loaded') || img.src) return;
        img.onload = () => {
            requestAnimationFrame(() => {
                lockHeight(div, img);
                div.classList.add('loaded');
                elStatus.textContent = (parseInt(div.dataset.idx) + 1) + ' / ' + IMAGES.length;
            });
        };
        img.onerror = () => {
            const info = div.querySelector('.frame-info');
            if (info) info.textContent = 'Load failed';
        };
        img.src = img.dataset.src;
    }

    function unloadImage(div) {
        if (!div.style.minHeight) return;
        const img = div.querySelector('img');
        if (img && img.src) {
            img.removeAttribute('src');
            div.classList.remove('loaded');
        }
    }

    // ── SCROLLMAGIC REVEAL OBSERVER ─────────────────────────────────────
    function initRevealObserver() {
        state.smObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.remove('sm-before');
                    entry.target.classList.add('sm-visible');
                    state.smObserver.unobserve(entry.target);
                }
            });
        }, { rootMargin: '-40px 0px -40px 0px', threshold: 0.05 });
    }

    // ── MEMORY / LAZY OBSERVER ──────────────────────────────────────────
    function initMemoryObserver() {
        state.observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (!entry.isIntersecting) return;
                const idx = parseInt(entry.target.dataset.idx);
                manageMemory(idx);
            });
        }, { rootMargin: '800px 0px 800px 0px' });
    }

    function manageMemory(centerIdx) {
        const min = centerIdx - PRELOAD;
        const max = centerIdx + PRELOAD;
        const children = elFrames.children;

        for (let i = 0; i < children.length; i++) {
            const div = children[i];
            const idx = parseInt(div.dataset.idx);
            if (Math.abs(idx - centerIdx) > 80) continue;
            if (idx >= min && idx <= max) {
                loadImage(div);
            } else {
                unloadImage(div);
            }
        }

        // Trigger next batch when near the end
        if (centerIdx >= state.loadedCount - 8 && state.loadedCount < IMAGES.length) {
            renderBatch();
        }
    }

    // ── RENDER ──────────────────────────────────────────────────────────
    function renderBatch() {
        if (state.isRendering) return;
        state.isRendering = true;

        const start = state.loadedCount;
        const end   = Math.min(start + BATCH, IMAGES.length);

        if (start >= IMAGES.length) {
            state.isRendering = false;
            return;
        }

        const frag = document.createDocumentFragment();

        for (let i = start; i < end; i++) {
            const item = IMAGES[i];
            // Support both { src } (frames) and { url } (videos used as images)
            const src     = item.src || item.url || '';
            const caption = item.alt || item.title || item.name || '';

            const div = document.createElement('div');
            div.className = 'frame sm-before';
            div.dataset.idx = i;

            div.innerHTML =
                '<div class="placeholder">' +
                    '<div class="spinner"></div>' +
                    '<div class="frame-info">#' + (i + 1) + '</div>' +
                '</div>' +
                '<img data-src="' + escAttr(src) + '" loading="lazy" alt="' + escAttr(caption) + '">' +
                '<div class="frame-caption' + (caption ? ' has-caption' : '') + '">' + escHtml(caption) + '</div>';

            // Click → lightbox
            div.addEventListener('click', () => openLbox(i));

            state.observer.observe(div);
            state.smObserver.observe(div);
            frag.appendChild(div);
        }

        elFrames.appendChild(frag);
        state.loadedCount = end;
        state.isRendering = false;

        // Preload very first frames immediately
        if (start === 0) {
            const first = elFrames.querySelectorAll('.frame');
            for (let k = 0; k < Math.min(first.length, 6); k++) loadImage(first[k]);
        }

        elStatus.textContent = IMAGES.length + ' images';
    }

    // ── LIGHTBOX ────────────────────────────────────────────────────────
    function openLbox(idx) {
        state.lboxIndex = Math.max(0, Math.min(idx, IMAGES.length - 1));
        updateLbox();
        elLbox.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeLbox() {
        elLbox.classList.remove('active');
        document.body.style.overflow = '';
        elLboxImg.src = '';
    }

    function updateLbox() {
        const item = IMAGES[state.lboxIndex];
        const src  = item.src || item.url || '';
        elLboxImg.src = src;
        elLboxImg.alt = item.alt || item.title || '';
        elCounter.textContent = (state.lboxIndex + 1) + ' / ' + IMAGES.length;
    }

    document.getElementById('lboxClose').addEventListener('click', closeLbox);
    document.getElementById('lboxPrev').addEventListener('click', () => {
        state.lboxIndex = (state.lboxIndex - 1 + IMAGES.length) % IMAGES.length;
        updateLbox();
    });
    document.getElementById('lboxNext').addEventListener('click', () => {
        state.lboxIndex = (state.lboxIndex + 1) % IMAGES.length;
        updateLbox();
    });

    // Click outside image closes lightbox
    elLbox.addEventListener('click', (e) => {
        if (e.target === elLbox) closeLbox();
    });

    // Keyboard nav
    document.addEventListener('keydown', (e) => {
        if (!elLbox.classList.contains('active')) return;
        if (e.key === 'Escape') closeLbox();
        if (e.key === 'ArrowLeft') {
            state.lboxIndex = (state.lboxIndex - 1 + IMAGES.length) % IMAGES.length;
            updateLbox();
        }
        if (e.key === 'ArrowRight') {
            state.lboxIndex = (state.lboxIndex + 1) % IMAGES.length;
            updateLbox();
        }
    });

    // ── UTILS ────────────────────────────────────────────────────────────
    function escAttr(s) {
        return String(s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function escHtml(s) {
        return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── BOOT ─────────────────────────────────────────────────────────────
    function init() {
        if (!IMAGES || IMAGES.length === 0) {
            elStatus.textContent = 'No images';
            elFrames.innerHTML = '<div style="text-align:center;padding:60px 20px;color:#555;font-size:14px;">No images attached to this post.</div>';
            return;
        }

        elStatus.textContent = IMAGES.length + ' images';
        initRevealObserver();
        initMemoryObserver();
        renderBatch();
    }

    init();
})();
</script>
</body>
</html>
