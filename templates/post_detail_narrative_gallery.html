<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=0" />
    <title>{{POST_TITLE}}</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,600;0,900;1,600&display=swap" rel="stylesheet">

    <!-- Anime.js -->
    <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.1/lib/anime.min.js"></script>

    <!-- Data: either injected inline (live/preview) or loaded from sidecar JS (static export) -->
    {{SEQUENCE_DATA_JS}}

    <style>
        :root {
            --bg-deep: #050508;
            --accent: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.4);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-bg: rgba(15, 23, 42, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --font-ui: 'Inter', system-ui, sans-serif;
            --font-display: 'Playfair Display', serif;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-ui);
            overflow: hidden;
            overscroll-behavior: none;
        }

        /* --- Ambient Background --- */
        #ambient-bg {
            position: fixed; inset: -10%;
            width: 120%; height: 120%;
            z-index: 0;
            pointer-events: none;
            filter: blur(80px) saturate(1.5) opacity(0.4);
            transform: translateZ(0);
        }
        .ambient-layer {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            will-change: opacity;
        }

        /* --- Back Button --- */
        .back-btn {
            position: fixed;
            top: 14px;
            left: 14px;
            z-index: 300;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: rgba(5, 5, 8, 0.75);
            border: 1px solid rgba(255,255,255,0.10);
            color: rgba(255,255,255,0.70);
            padding: 7px 13px;
            border-radius: 99px;
            font-family: var(--font-ui);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-decoration: none;
            backdrop-filter: blur(8px);
            transition: all 0.25s ease;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.07);
            color: #fff;
            border-color: rgba(255,255,255,0.22);
        }
        .back-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; flex-shrink: 0; }

        /* --- Split Layout Architecture --- */
        #layout {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            z-index: 10;
            height: 100dvh;
        }

        /* MEDIA STAGE */
        #media-stage {
            position: relative;
            flex: none;
            width: 100%;
            aspect-ratio: 1 / 1;
            max-height: 55dvh;
            background: #000;
            z-index: 20;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
        }

        .media-frame {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        .media-plane {
            position: absolute;
            inset: -5%;
            width: 110%;
            height: 110%;
            object-fit: cover;
            opacity: 0;
            will-change: transform, opacity;
            transform-origin: center center;
        }

        /* STORY THREAD */
        #story-thread {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            scroll-behavior: smooth;
            padding: 30px 20px 60vh 20px;
            position: relative;
            z-index: 15;
            background: linear-gradient(180deg, rgba(5,5,8,0.4) 0%, rgba(5,5,8,0.95) 15%);
        }

        @media(min-width: 1024px) {
            #layout { flex-direction: row; }
            #media-stage {
                flex: 0 0 55vw;
                height: 100dvh;
                max-height: none;
                aspect-ratio: auto;
                background: transparent;
                box-shadow: none;
                padding: 40px;
                display: flex; align-items: center; justify-content: center;
            }
            .media-frame {
                position: relative;
                width: 100%; height: 100%;
                border-radius: 16px;
                box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            }
            #story-thread {
                flex: 0 0 45vw;
                height: 100dvh;
                padding: 100px 60px 80vh 40px;
                background: transparent;
            }
        }

        /* --- Story Beats --- */
        .story-beat {
            position: relative;
            margin-bottom: 60px;
            padding-left: 25px;
            opacity: 0.2;
            transform: scale(0.95) translateX(-10px);
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            will-change: transform, opacity;
        }

        .story-beat::before {
            content: ''; position: absolute;
            left: 0; top: 10px; bottom: -70px;
            width: 2px;
            background: rgba(255,255,255,0.08);
        }

        .story-beat::after {
            content: ''; position: absolute;
            left: -4px; top: 10px;
            width: 10px; height: 10px;
            border-radius: 50%;
            background: var(--text-muted);
            border: 2px solid var(--bg-deep);
            transition: all 0.4s;
        }

        .story-beat.active {
            opacity: 1;
            transform: scale(1) translateX(0);
        }
        .story-beat.active::after {
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
            transform: scale(1.4);
            border-color: #000;
        }

        .beat-index {
            font-family: monospace;
            color: var(--accent);
            letter-spacing: 0.15em;
            font-size: 0.75rem;
            display: block;
            font-weight: 700;
        }

        .beat-title {
            font-family: var(--font-display);
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            margin: 0 0 12px 0;
            line-height: 1.1;
            color: #fff;
        }

        .beat-desc {
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .desc-hidden { display: none; opacity: 0; }
        .read-more-toggle {
            color: var(--accent); cursor: pointer;
            font-weight: 600; font-size: 0.9rem;
            margin-left: 6px; transition: color 0.2s; white-space: nowrap;
        }
        .read-more-toggle:hover { color: #fff; }

        /* --- Glassmorphic Data Panels --- */
        .intel-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 16px;
            display: flex; flex-direction: column; gap: 12px;
        }

        .intel-row { display: flex; flex-direction: column; gap: 6px; }
        .intel-label {
            font-size: 0.65rem; text-transform: uppercase;
            letter-spacing: 0.1em; color: rgba(255,255,255,0.4); font-weight: 700;
        }
        .pill-wrap { display: flex; flex-wrap: wrap; gap: 6px; }

        .pill {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 4px 10px; border-radius: 12px;
            font-size: 0.75rem; color: #cbd5e1;
            white-space: normal;
            word-break: break-word;
            max-width: 100%;
            line-height: 1.4;
            display: inline-block;
        }
        .pill.hl { border-color: rgba(16, 185, 129, 0.4); color: #34d399; background: rgba(16, 185, 129, 0.05); }
        .pill.char { border-color: rgba(245, 159, 11, 0.3); color: #fbbf24; }

        .director-note {
            background: rgba(0,0,0,0.4);
            border-left: 2px solid #8b5cf6;
            padding: 10px 12px;
            font-size: 0.85rem; line-height: 1.5;
            color: #e2e8f0; font-style: italic;
            border-radius: 0 6px 6px 0;
        }

        /* --- Beat Navigation Actions --- */
        .btn-beat-action {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-muted);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
            text-transform: uppercase;
            backdrop-filter: blur(4px);
        }
        .btn-beat-action:hover {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent);
            border-color: rgba(16, 185, 129, 0.4);
            box-shadow: 0 0 10px var(--accent-glow);
        }
        .btn-beat-action svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2.5; }

        /* --- Sequence Header --- */
        .seq-header {
            margin-bottom: 80px; padding-bottom: 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            /* Push content below fixed back-btn on mobile */
            padding-top: 44px;
        }
        @media(min-width: 1024px) {
            .seq-header { padding-top: 0; }
        }
        .seq-header-top {
            display: flex; justify-content: space-between;
            align-items: flex-start; gap: 15px;
            margin-bottom: 15px; flex-wrap: wrap;
        }

        .seq-header h1 {
            font-family: var(--font-display);
            font-size: clamp(2.2rem, 6vw, 4rem);
            margin: 0; line-height: 1.1;
        }
        .seq-header p.sub {
            color: var(--accent); text-transform: uppercase;
            letter-spacing: 0.2em; font-size: 0.75rem;
            font-weight: 800; margin: 0 0 10px 0;
        }
        .seq-header .desc { color: var(--text-muted); line-height: 1.6; font-size: 1rem; }

        /* --- Image Lightbox (replaces iframe modal for static context) --- */
        .lbox {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.96);
            z-index: 100000; display: none;
            align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
        }
        .lbox.active { display: flex; }
        .lbox img {
            max-width: 95vw; max-height: 95vh;
            object-fit: contain; border-radius: 6px;
            display: block;
        }
        .lbox-close {
            position: absolute; top: 16px; right: 16px;
            width: 38px; height: 38px;
            background: rgba(0,0,0,0.75); color: #fff;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 20px; z-index: 200;
            transition: all 0.2s; backdrop-filter: blur(5px);
            line-height: 1;
        }
        .lbox-close:hover { background: var(--accent); color: #000; border-color: var(--accent); }
    </style>
</head>
<body>

    <!-- Back to gallery -->
    <a class="back-btn" href="{{BACK_TO_GRID_URL}}">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.2"/><rect x="14" y="3" width="7" height="7" rx="1.2"/><rect x="3" y="14" width="7" height="7" rx="1.2"/><rect x="14" y="14" width="7" height="7" rx="1.2"/></svg>
        Gallery
    </a>

    <!-- Ambient Background -->
    <div id="ambient-bg">
        <img id="amb-a" class="ambient-layer" src="" alt="">
        <img id="amb-b" class="ambient-layer" src="" alt="">
    </div>

    <!-- Main Layout -->
    <div id="layout">

        <!-- MEDIA STAGE -->
        <div id="media-stage">
            <div class="media-frame" id="media-frame">
                <img id="img-a" class="media-plane" src="" alt="">
                <img id="img-b" class="media-plane" src="" alt="">
            </div>
        </div>

        <!-- STORY THREAD -->
        <div id="story-thread">
            <div class="seq-header">
                <div class="seq-header-top">
                    <div>
                        <p class="sub">Narrative Sequence</p>
                        <h1 id="ui-seq-name">{{POST_TITLE}}</h1>
                    </div>
                    <span class="pill hl" id="frame-count-badge" style="font-family:monospace;font-weight:700;font-size:0.8rem;padding:6px 12px;align-self:flex-start;">— FRAMES</span>
                </div>
                <div class="desc" id="ui-seq-desc">{{POST_CONTENT}}</div>
            </div>
            <div id="beats-container"></div>
        </div>
    </div>

    <!-- Image Lightbox -->
    <div class="lbox" id="lbox">
        <div class="lbox-close" id="lboxClose">&times;</div>
        <img id="lboxImg" src="" alt="">
    </div>

    <script>
    (function () {
        var sequenceDataObj = (typeof sequenceData !== 'undefined') ? sequenceData : { name: '', description: '', frames: [] };
        var frames = sequenceDataObj.frames || [];

        // State
        var activeIndex    = -1;
        var activePlane    = 'img-a';
        var continuousPanAnim = null;
        var transitionToken   = 0;
        var imageLoadCache    = new Map();

        // DOM
        var elImgA        = document.getElementById('img-a');
        var elImgB        = document.getElementById('img-b');
        var elAmbA        = document.getElementById('amb-a');
        var elAmbB        = document.getElementById('amb-b');
        var thread        = document.getElementById('story-thread');
        var beatsContainer = document.getElementById('beats-container');
        var lbox          = document.getElementById('lbox');
        var lboxImg       = document.getElementById('lboxImg');

        // ── Image preload ───────────────────────────────────────────────────
        function preloadFrameImage(src) {
            if (!src) return Promise.resolve('');
            if (imageLoadCache.has(src)) return imageLoadCache.get(src);
            var promise = new Promise(function (resolve) {
                var img = new Image();
                img.onload  = function () { resolve(src); };
                img.onerror = function () { resolve(src); };
                img.src = src;
            });
            imageLoadCache.set(src, promise);
            return promise;
        }

        // ── Build UI ────────────────────────────────────────────────────────
        function init() {
            var seqName = sequenceDataObj.name || document.getElementById('ui-seq-name').innerText;
            var seqDesc = sequenceDataObj.description || document.getElementById('ui-seq-desc').innerText;

            document.getElementById('ui-seq-name').innerText = seqName;
            document.getElementById('ui-seq-desc').innerText = seqDesc || 'Scroll through the thread below to experience the sequence.';
            document.getElementById('frame-count-badge').innerText = frames.length + ' FRAMES';

            frames.forEach(function (frame, i) {
                var cur = frame.curation || {};
                var cls = cur.class    || {};
                var thm = cur.themes   || {};
                var ent = cur.entities || {};
                var recs = cur.recs   || {};

                var fnHtml  = cls.narrative_function ? '<span class="pill hl">' + cls.narrative_function + '</span>' : '';
                var tnHtml  = cls.emotional_tone     ? '<span class="pill">'    + cls.emotional_tone     + '</span>' : '';
                var thmHtml = '';
                if (thm.primary_themes) {
                    thm.primary_themes.slice(0, 3).forEach(function (t) { thmHtml += '<span class="pill">' + t + '</span>'; });
                }
                var entHtml = '';
                if (ent.characters) { ent.characters.forEach(function (c) { entHtml += '<span class="pill char">\uD83D\uDC64 ' + c + '</span>'; }); }
                if (ent.locations)  { ent.locations.forEach(function  (l) { entHtml += '<span class="pill">\uD83D\uDCCD ' + l + '</span>'; }); }

                var intelHtml = '';
                if (fnHtml || tnHtml || thmHtml || entHtml || (recs && recs.potential_use)) {
                    intelHtml = '<div class="intel-card">' +
                        ((fnHtml || tnHtml) ? '<div class="intel-row"><span class="intel-label">Classification</span><div class="pill-wrap">' + fnHtml + tnHtml + '</div></div>' : '') +
                        (thmHtml ? '<div class="intel-row"><span class="intel-label">Themes</span><div class="pill-wrap">' + thmHtml + '</div></div>' : '') +
                        (entHtml ? '<div class="intel-row"><span class="intel-label">Entities</span><div class="pill-wrap">' + entHtml + '</div></div>' : '') +
                        (recs.potential_use ? '<div class="intel-row"><span class="intel-label">AI Director\'s Note</span><div class="director-note">' + recs.potential_use + '</div></div>' : '') +
                        '</div>';
                }

                // Text truncation
                var descText = (frame.desc || '').trim();
                var words    = descText.split(/\s+/);
                var descHtml = '';
                if (words.length > 25) {
                    var visible = words.slice(0, 25).join(' ');
                    var hidden  = words.slice(25).join(' ');
                    descHtml =
                        '<span class="desc-visible">' + visible + '</span><span class="desc-ellipsis">...</span>' +
                        '<span class="desc-hidden" style="display:none;"> ' + hidden + '</span>' +
                        '<span class="read-more-toggle" onclick="toggleDesc(event,' + i + ')">Read more</span>';
                } else {
                    descHtml = descText;
                }

                var hasPrev = i > 0;
                var hasNext = i < frames.length - 1;

                var beat = document.createElement('div');
                beat.className    = 'story-beat';
                beat.id           = 'beat-' + i;
                beat.dataset.index = i;

                var navPrev = hasPrev
                    ? '<button class="btn-beat-action" onclick="scrollToBeat(' + (i - 1) + ')" title="Scroll to Previous"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12l7-7 7 7"/></svg> Prev</button>'
                    : '';
                var navNext = hasNext
                    ? '<button class="btn-beat-action" onclick="scrollToBeat(' + (i + 1) + ')" title="Scroll to Next">Next <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12l7 7 7-7"/></svg></button>'
                    : '';

                beat.innerHTML =
                    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">' +
                        '<span class="beat-index" style="margin-bottom:0;">FRAME ' + String(i + 1).padStart(2, '0') + '</span>' +
                        '<div style="display:flex;gap:8px;">' +
                            '<button class="btn-beat-action" onclick="scrollToTop()" title="Back to Top"><svg viewBox="0 0 24 24"><path d="M5 15l7-7 7 7"/></svg> Top</button>' +
                            navPrev + navNext +
                        '</div>' +
                    '</div>' +
                    '<h2 class="beat-title">' + (frame.name || 'Untitled Frame') + '</h2>' +
                    '<div class="beat-desc">' + descHtml + '</div>' +
                    intelHtml;

                beatsContainer.appendChild(beat);
            });

            // Prime first image
            if (frames.length > 0) {
                var firstThumb = frames[0].thumb || '';
                if (firstThumb) {
                    elImgA.src = firstThumb;
                    elAmbA.src = firstThumb;
                }
                elImgA.style.opacity = '1';
                elAmbA.style.opacity = '1';
                elImgA.style.transform = 'scale(1)';
            }

            setupIntersectionObserver();
        }

        // ── Helpers exposed to inline onclick ──────────────────────────────
        window.scrollToTop  = function () { thread.scrollTo({ top: 0, behavior: 'smooth' }); };
        window.scrollToBeat = function (idx) {
            var el = document.getElementById('beat-' + idx);
            if (el) thread.scrollTo({ top: el.offsetTop - 20, behavior: 'smooth' });
        };

        window.toggleDesc = function (e, idx) {
            e.stopPropagation();
            var beat     = document.getElementById('beat-' + idx);
            var hidden   = beat.querySelector('.desc-hidden');
            var ellipsis = beat.querySelector('.desc-ellipsis');
            var btn      = beat.querySelector('.read-more-toggle');
            if (!hidden) return;
            if (hidden.style.display === 'none') {
                hidden.style.display = 'inline';
                ellipsis.style.display = 'none';
                btn.innerText = 'Show less';
                anime({ targets: hidden, opacity: [0, 1], duration: 400, easing: 'easeOutQuad' });
            } else {
                hidden.style.display = 'none';
                ellipsis.style.display = 'inline';
                btn.innerText = 'Read more';
                hidden.style.opacity = '0';
            }
        };

        // ── Intersection Observer (scroll-driven beat activation) ───────────
        function setupIntersectionObserver() {
            var observer = new IntersectionObserver(function (entries) {
                entries.forEach(function (entry) {
                    if (entry.isIntersecting) {
                        activateBeat(parseInt(entry.target.dataset.index));
                    }
                });
            }, {
                root: thread,
                rootMargin: '-30% 0px -40% 0px',
                threshold: 0
            });
            document.querySelectorAll('.story-beat').forEach(function (beat) { observer.observe(beat); });
        }

        // ── Anime.js Visual Transitions ─────────────────────────────────────
        function activateBeat(index) {
            if (index === activeIndex) return;

            var beatEl = document.getElementById('beat-' + index);
            if (!beatEl) return;

            document.querySelectorAll('.story-beat').forEach(function (b) { b.classList.remove('active'); });
            beatEl.classList.add('active');

            var newFrame = frames[index];
            if (!newFrame || !newFrame.thumb) { activeIndex = index; return; }

            var myToken       = ++transitionToken;
            var previousIndex = activeIndex;
            activeIndex = index;

            preloadFrameImage(newFrame.thumb).then(function () {
                if (myToken !== transitionToken) return;

                var previousPlaneId = activePlane;
                var oldPlane = previousPlaneId === 'img-a' ? elImgA : elImgB;
                var newPlane = previousPlaneId === 'img-a' ? elImgB : elImgA;
                var oldAmb   = previousPlaneId === 'img-a' ? elAmbA : elAmbB;
                var newAmb   = previousPlaneId === 'img-a' ? elAmbB : elAmbA;

                activePlane = newPlane.id;

                newPlane.src = newFrame.thumb;
                newAmb.src   = newFrame.thumb;
                newPlane.style.zIndex = '2';
                oldPlane.style.zIndex = '1';

                if (continuousPanAnim) continuousPanAnim.pause();

                var scrollingDown = index > previousIndex;
                var yOffset   = scrollingDown ? 15 : -15;
                var rotateDir = scrollingDown ? 4  : -4;

                anime.remove([oldPlane, newPlane, oldAmb, newAmb, document.getElementById('media-frame')]);
                anime.set(newPlane, { opacity: 0, scale: 1.15, translateX: 0, translateY: 0, rotateZ: 0 });
                anime.set(oldPlane, { opacity: 1 });

                var tl = anime.timeline({ easing: 'easeOutCubic' });

                anime({ targets: newAmb, opacity: 1, duration: 1500, easing: 'linear' });
                anime({ targets: oldAmb, opacity: 0, duration: 1500, easing: 'linear' });

                tl.add({ targets: document.getElementById('media-frame'), scale: [0.98, 1], duration: 800 }, 0);
                tl.add({ targets: newPlane, opacity: [0, 1], translateY: [yOffset + '%', '0%'], scale: [1.1, 1], rotateZ: [rotateDir, 0], duration: 1000 }, 0);
                tl.add({ targets: oldPlane, opacity: [1, 0], translateY: ['0%', (-yOffset) + '%'], scale: [1, 0.9], duration: 900 }, 0);

                tl.finished.then(function () {
                    if (myToken === transitionToken) {
                        startContinuousPan(newPlane);
                    }
                });
            });
        }

        function startContinuousPan(targetElement) {
            var panX = (Math.random() > 0.5 ? 2 : -2) + '%';
            var panY = (Math.random() > 0.5 ? 2 : -2) + '%';
            continuousPanAnim = anime({
                targets: targetElement,
                scale: [1, 1.05],
                translateX: [0, panX],
                translateY: [0, panY],
                duration: 15000,
                easing: 'linear',
                direction: 'alternate',
                loop: true
            });
        }

        // ── Image Lightbox (tap active image to open) ───────────────────────
        document.getElementById('media-frame').addEventListener('click', function () {
            if (activeIndex === -1) return;
            var f = frames[activeIndex];
            if (!f || !f.thumb) return;
            lboxImg.src = f.thumb;
            lbox.classList.add('active');
        });

        document.getElementById('lboxClose').addEventListener('click', function () {
            lbox.classList.remove('active');
            lboxImg.src = '';
        });

        lbox.addEventListener('click', function (e) {
            if (e.target === lbox) {
                lbox.classList.remove('active');
                lboxImg.src = '';
            }
        });

        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape' && lbox.classList.contains('active')) {
                lbox.classList.remove('active');
                lboxImg.src = '';
            }
        });

        // ── Boot ─────────────────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', init);
    })();
    </script>
</body>
</html>
